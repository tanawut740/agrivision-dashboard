    /* =========================================================================
       THEME SYSTEM
       ========================================================================= */
    :root {

      --bg: oklch(14% 0.02 250);
      --surface: oklch(20% 0.03 250 / 0.7);
      --surface-solid: oklch(20% 0.03 250);

      --bg: oklch(98% 0.01 150);
      --surface: oklch(100% 0 0 / 0.8);

      --border: oklch(90% 0.02 150);
      --accent: oklch(55% 0.15 150);
      --blue: oklch(55% 0.15 240);
      --yellow: oklch(75% 0.15 90);
      --orange: oklch(65% 0.18 45);
      --red: oklch(55% 0.2 25);
      --glass: blur(8px);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }

    [data-theme='satellite'] {
      --bg: oklch(12% 0.01 180);
      --surface: oklch(18% 0.02 180 / 0.85);
      --surface-solid: oklch(18% 0.02 180);
      --surface-hover: oklch(22% 0.02 180);
      --fg: oklch(95% 0.01 180);
      --muted: oklch(65% 0.02 180);
      --border: oklch(28% 0.03 180);
      --accent: oklch(68% 0.18 160); /* Emerald */
      --blue: oklch(60% 0.12 210);
      --yellow: oklch(78% 0.16 80); /* Amber */
      --orange: oklch(68% 0.18 40);
      --red: oklch(58% 0.18 20);
      --glass: blur(16px);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    /* =========================================================================
       BASE STYLES
       ========================================================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.01em; }

    /* Layout Shell */
    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 64px 1fr;
      height: 100vh;
      width: 100vw;
    }

    .top-nav {
      grid-column: 1 / -1;
      background: var(--surface);
      backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .sidebar {
      background: var(--surface);
      backdrop-filter: var(--glass);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 12px;
      gap: 8px;
      z-index: 900;
      overflow-y: auto;
    }

    .main-content {
      position: relative;
      overflow-y: auto;
      padding: 24px;
      background: radial-gradient(circle at top right, var(--surface), transparent);
    }

    /* Navigation Items */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .nav-item:hover {
      background: var(--surface-hover);
      color: var(--fg);
    }

    .nav-item.active {
      background: var(--accent);
      color: var(--bg);
    }

    .nav-item svg { width: 18px; height: 18px; }

    /* Dashboard UI Components */
    .card {
      background: var(--surface);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .card:hover { border-color: var(--accent); }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-trend { font-size: 12px; display: flex; align-items: center; gap: 4px; }

    /* Map Specific */
    .map-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .map-ui {
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      bottom: 24px;
      pointer-events: none;
      z-index: 100;
      display: grid;
      grid-template-columns: 270px 1fr 340px;
      gap: 24px;
    }
    .map-panel {
      pointer-events: auto;
      background: rgba(5, 15, 30, 0.94);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, 0.55);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      color: #f8fafc;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);

    .map-panel h4,
    .map-panel label,
    .map-panel p,
    .map-panel span,
    .map-panel div {
      color: inherit;
    }

    .map-panel input {
      color: #ffffff !important;
    }

    .map-panel input::placeholder {
      color: rgba(226, 232, 240, 0.78);
    }

    .map-info-box {
      background: rgba(2, 6, 23, 0.82) !important;
      border: 1px solid rgba(148, 163, 184, 0.5) !important;
      color: #f8fafc !important;
    }

    .agri-popup {
      font-family: Arial, sans-serif;
      line-height: 1.55;
      color: #07111f;
      background: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      min-width: 210px;
    }

    .agri-popup b { color: #052e16; }
    .agri-popup hr { border: none; border-top: 1px solid #cbd5e1; margin: 6px 0; }

    /* Utils */
    .badge {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-success { background: var(--accent); color: var(--bg); }
    .badge-warning { background: var(--yellow); color: var(--bg); }
    .badge-danger { background: var(--red); color: var(--fg); }
    .badge-info { background: var(--blue); color: var(--fg); }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
      color: var(--fg);
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    /* Chart Simulation */
    .chart-placeholder {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding-top: 20px;
    }
    .chart-bar {
      flex: 1;
      background: var(--accent);
      border-radius: 4px 4px 0 0;
      min-height: 20px;
      opacity: 0.8;
      transition: height 0.3s ease;
      position: relative;
    }
    .chart-bar:hover { opacity: 1; filter: brightness(1.2); }

    /* Alerts */
    .alert-item {
      display: flex;
      gap: 16px;
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid var(--border);
      background: var(--surface);
      margin-bottom: 12px;
    }
    .alert-item.critical { border-left-color: var(--red); }
    .alert-item.warning { border-left-color: var(--orange); }
    .alert-item.watch { border-left-color: var(--yellow); }
    .alert-item.normal { border-left-color: var(--accent); }

    /* Settings */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .theme-card {
      cursor: pointer;
      border: 2px solid transparent;
      padding: 24px;
      border-radius: 16px;
      transition: all 0.2s;
    }
    .theme-card.active { border-color: var(--accent); background: var(--surface-hover); }

    /* Transitions */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* --- PAGE: Map --- */
    const MapPage = () => {
      const mapContainer = useRef(null);
      const map = useRef(null);
      const [selection, setSelection] = useState(null);
      const [pendingSelection, setPendingSelection] = useState(null);
      const [mapError, setMapError] = useState("");

      const createMockSelection = (lat, lon, clickedZone = null) => {
        const ndvi = +(0.58 + Math.random() * 0.16).toFixed(2);
        const ndwi = +(0.28 + Math.random() * 0.18).toFixed(2);
        const stress = +Math.max(0, (0.45 - ndwi) / 0.20).toFixed(2);
        const water = +(5 + stress * 5.5).toFixed(1);
        const health = Math.round((0.40 * ndvi + 0.35 * ndwi + 0.25 * 0.78) * 100);
        const risk = stress > 0.55 ? "เสี่ยงสูง" : stress > 0.25 ? "เฝ้าระวัง" : "ปกติ";
        const confidence = stress > 0.55 ? "Low" : stress > 0.25 ? "Medium" : "High";

        return {
          lat: lat.toFixed(6),
          lng: lon.toFixed(6),
          ndvi: ndvi.toFixed(2),
          ndwi: ndwi.toFixed(2),
          stress: stress.toFixed(2),
          water: water.toFixed(1),
          health,
          risk,
          confidence,
          zoneId: clickedZone ? clickedZone.id : "นอกกรอบ",
          zoneName: clickedZone ? clickedZone.name : "นอกพื้นที่แปลง A/B/C/D",
          zoneStatus: clickedZone ? clickedZone.status : "ไม่อยู่ในกรอบแปลง"
        };
      };

      const createCirclePolygon = (lat, lon, radiusMeters = 500, points = 64) => {
        const earthRadius = 6378137;
        const coords = [];
        const latRad = lat * Math.PI / 180;
        const lonRad = lon * Math.PI / 180;
        const angularDistance = radiusMeters / earthRadius;

        for (let i = 0; i <= points; i++) {
          const bearing = (i / points) * 2 * Math.PI;
          const pointLat = Math.asin(
            Math.sin(latRad) * Math.cos(angularDistance) +
            Math.cos(latRad) * Math.sin(angularDistance) * Math.cos(bearing)
          );
          const pointLon = lonRad + Math.atan2(
            Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(latRad),
            Math.cos(angularDistance) - Math.sin(latRad) * Math.sin(pointLat)
          );
          coords.push({ lon: pointLon * 180 / Math.PI, lat: pointLat * 180 / Math.PI });
        }

        return coords;
      };

      const FARM_OUTER_BOUNDARY = [
        { lon: 102.1917, lat: 14.5303 },
        { lon: 102.1969, lat: 14.5300 },
        { lon: 102.2030, lat: 14.5291 },
        { lon: 102.2042, lat: 14.5264 },
        { lon: 102.2035, lat: 14.5228 },
        { lon: 102.2024, lat: 14.5202 },
        { lon: 102.1973, lat: 14.5228 },
        { lon: 102.1951, lat: 14.5209 },
        { lon: 102.1919, lat: 14.5215 },
        { lon: 102.1908, lat: 14.5239 },
        { lon: 102.1928, lat: 14.5259 },
        { lon: 102.1917, lat: 14.5283 },
        { lon: 102.1917, lat: 14.5303 }
      ];

      const FARM_ZONES = [
        {
          id: "A",
          name: "Zone A - แปลงบนซ้าย",
          center: { lat: 14.5279, lon: 102.1949 },
          coords: [
            { lon: 102.1917, lat: 14.5303 },
            { lon: 102.1969, lat: 14.5300 },
            { lon: 102.1976, lat: 14.5270 },
            { lon: 102.1962, lat: 14.5256 },
            { lon: 102.1928, lat: 14.5259 },
            { lon: 102.1917, lat: 14.5283 },
            { lon: 102.1917, lat: 14.5303 }
          ],
          lineColor: "rgba(0, 255, 136, 0.98)",
          fillColor: "rgba(0, 255, 136, 0.13)",
          status: "ปกติ"
        },
        {
          id: "B",
          name: "Zone B - แปลงบนขวา",
          center: { lat: 14.5269, lon: 102.2005 },
          coords: [
            { lon: 102.1969, lat: 14.5300 },
            { lon: 102.2030, lat: 14.5291 },
            { lon: 102.2042, lat: 14.5264 },
            { lon: 102.2008, lat: 14.5247 },
            { lon: 102.1976, lat: 14.5270 },
            { lon: 102.1969, lat: 14.5300 }
          ],
          lineColor: "rgba(255, 214, 10, 0.98)",
          fillColor: "rgba(255, 214, 10, 0.14)",
          status: "เฝ้าระวัง"
        },
        {
          id: "C",
          name: "Zone C - แปลงล่างซ้าย",
          center: { lat: 14.5235, lon: 102.1942 },
          coords: [
            { lon: 102.1928, lat: 14.5259 },
            { lon: 102.1962, lat: 14.5256 },
            { lon: 102.1973, lat: 14.5228 },
            { lon: 102.1951, lat: 14.5209 },
            { lon: 102.1919, lat: 14.5215 },
            { lon: 102.1908, lat: 14.5239 },
            { lon: 102.1928, lat: 14.5259 }
          ],
          lineColor: "rgba(255, 106, 0, 0.98)",
          fillColor: "rgba(255, 106, 0, 0.16)",
          status: "ต้องรดน้ำเพิ่ม"
        },
        {
          id: "D",
          name: "Zone D - แปลงล่างขวา",
          center: { lat: 14.5232, lon: 102.2001 },
          coords: [
            { lon: 102.1962, lat: 14.5256 },
            { lon: 102.2008, lat: 14.5247 },
            { lon: 102.2035, lat: 14.5228 },
            { lon: 102.2024, lat: 14.5202 },
            { lon: 102.1973, lat: 14.5228 },
            { lon: 102.1962, lat: 14.5256 }
          ],
          lineColor: "rgba(255, 48, 64, 0.98)",
          fillColor: "rgba(255, 48, 64, 0.14)",
          status: "เสี่ยงสูง"
        }
      ];

      const pointInPolygon = (lat, lon, polygon) => {
        let inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
          const xi = polygon[i].lon, yi = polygon[i].lat;
          const xj = polygon[j].lon, yj = polygon[j].lat;
          const intersect = ((yi > lat) !== (yj > lat)) &&
            (lon < (xj - xi) * (lat - yi) / ((yj - yi) || 0.0000001) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      };

      const getClickedZone = (lat, lon) => {
        return FARM_ZONES.find(zone => pointInPolygon(lat, lon, zone.coords));
      };

      const drawFarmZoneFrames = () => {
        if (!map.current || !window.sphere) return;

        try {
          const outer = new sphere.Polygon(
            FARM_OUTER_BOUNDARY,
            {
              lineWidth: 5,
              lineColor: "rgba(255, 255, 255, 0.85)",
              fillColor: "rgba(255, 255, 255, 0.03)"
            }
          );
          map.current.Overlays.add(outer);
        } catch (err) {
          console.warn("Cannot draw outer farm boundary", err);
        }

        FARM_ZONES.forEach((zone) => {
          try {
            const polygon = new sphere.Polygon(
              zone.coords,
              {
                lineWidth: 3,
                lineColor: zone.lineColor,
                fillColor: zone.fillColor
              }
            );
            map.current.Overlays.add(polygon);
          } catch (err) {
            console.warn("Cannot draw farm zone frame", zone.id, err);
          }

          try {
            const label = new sphere.Marker(
              { lon: zone.center.lon, lat: zone.center.lat },
              {
                title: `📍 แปลง ${zone.id}`,
                detail: `<div class="agri-popup"><b>แปลง ${zone.id}</b><br>${zone.name}<br><b>สถานะ:</b> ${zone.status}<br><b>หมายเหตุ:</b> หมุดนี้คือจุดกลางของกรอบพื้นที่</div>`
              }
            );
            map.current.Overlays.add(label);
          } catch (err) {
            console.warn("Cannot add farm zone label", zone.id, err);
          }
        });
      };

      const addRadiusOverlay = (lat, lon) => {
        // GISTDA sphere.Circle may interpret radius differently in some environments.
        // To prevent an oversized circle, always draw a geodesic polygon calculated in meters.
        const analysisDistanceMeters = 500;

        try {
          const polygonOverlay = new sphere.Polygon(
            createCirclePolygon(lat, lon, analysisDistanceMeters, 96),
            {
              lineWidth: 3,
              lineColor: "rgba(0, 229, 255, 0.95)",
              fillColor: "rgba(0, 229, 255, 0.16)"
            }
          );
          map.current.Overlays.add(polygonOverlay);
        } catch (err) {
          console.warn("Cannot draw 500m analysis distance overlay", err);
        }
      };

      const addPopup = (lat, lon, result) => {
        try {
          const popup = new sphere.Popup(
            { lon, lat },
            {
              title: "AgriVision Analysis",
              detail: `
                <div class="agri-popup">
                  <b>📍 จุดที่เลือก</b><br>
                  <b>ระยะวิเคราะห์:</b> 500 เมตร<br>
                  <b>แปลงที่เลือก:</b> ${result.zoneId} (${result.zoneStatus})<br>
                  <b>Latitude:</b> ${result.lat}<br>
                  <b>Longitude:</b> ${result.lng}<br>
                  <hr>
                  <b>NDVI:</b> ${result.ndvi}<br>
                  <b>NDWI:</b> ${result.ndwi}<br>
                  <b>Health Score:</b> ${result.health}/100<br>
                  <b>Stress Factor:</b> ${result.stress}<br>
                  <b>Water Need:</b> ${result.water} ลบ.ม./วัน<br>
                  <b>Confidence:</b> ${result.confidence}
                </div>
              `
            }
          );
          map.current.Overlays.add(popup);
        } catch (err) {
          console.warn("Cannot add popup", err);
        }
      };

      const addMarker = (lat, lon) => {
        try {
          const markerOverlay = new sphere.Marker(
            { lon, lat },
            {
              title: "📍 จุดที่คลิก",
              detail: `<div class="agri-popup"><b>จุดวิเคราะห์ที่เลือก</b><br>ระยะพื้นที่วิเคราะห์ 500 เมตร<br>Lat: ${lat.toFixed(6)}<br>Lon: ${lon.toFixed(6)}</div>`
            }
          );
          map.current.Overlays.add(markerOverlay);
        } catch (err) {
          console.warn("Cannot add marker", err);
        }
      };

      useEffect(() => {
        if (!mapContainer.current) return;

        if (!window.sphere) {
          setMapError("ไม่สามารถโหลด GISTDA Sphere Map ได้ กรุณาตรวจสอบ API key, Internet, domain restriction หรือ WebGL");
          return;
        }

        try {
          map.current = new sphere.Map({
            placeholder: mapContainer.current
          });

          // GISTDA Sphere บาง environment เรียก goTo() แล้วไปชน easeTo ที่ไม่มีอยู่
          // เลยใช้ location() + zoom() ตามตัวอย่าง official HTML แทน
          try {
            if (typeof map.current.location === "function") {
              map.current.location({ lon: 102.1977, lat: 14.5251 });
            }
            if (typeof map.current.zoom === "function") {
              map.current.zoom(15);
            }
          } catch (err) {
            console.warn("Cannot set map center/zoom", err);
          }

          try {
            map.current.Ui.DPad.visible(false);
            map.current.Ui.Geolocation.visible(false);
            map.current.Ui.Zoombar.visible(false);
            map.current.Ui.Scale.visible(false);
            map.current.Ui.Fullscreen.visible(false);
            map.current.Ui.LayerSelector.visible(false);
          } catch (err) {
            console.warn("Some Sphere UI controls are unavailable", err);
          }

          try {
            if (window.sphere.Layers && window.sphere.Layers.HYBRID) {
              map.current.Layers.setBase(window.sphere.Layers.HYBRID);
            }
          } catch (err) {
            console.warn("Cannot set Sphere base layer", err);
          }

          drawFarmZoneFrames();

          map.current.Event.bind(sphere.EventName.Click, function(location) {
            const lat = Number(location.lat);
            const lon = Number(location.lon);
            const clickedZone = getClickedZone(lat, lon);
            const result = createMockSelection(lat, lon, clickedZone);

            try {
              map.current.Overlays.clear();
            } catch (err) {
              console.warn("Cannot clear overlays", err);
            }

            drawFarmZoneFrames();
            addRadiusOverlay(lat, lon);
            addMarker(lat, lon);
            setPendingSelection(result);
            setSelection(null);
          });
        } catch (err) {
          console.error(err);
          setMapError("สร้างแผนที่ GISTDA Sphere ไม่สำเร็จ: " + err.message);
        }

        return () => {
          try {
            if (map.current && map.current.Overlays) map.current.Overlays.clear();
          } catch (err) {}
          map.current = null;
        };
      }, []);

      return (
        <div style={{position: 'absolute', inset: 0, overflow: 'hidden'}}>
          <div ref={mapContainer} className="map-container"></div>
          <div style={{position:'absolute', left:'50%', transform:'translateX(-50%)', top:'18px', zIndex:110, background:'rgba(2,6,23,0.88)', color:'#f8fafc', padding:'10px 16px', borderRadius:'999px', border:'1px solid rgba(148,163,184,0.5)', boxShadow:'0 8px 24px rgba(0,0,0,0.45)', pointerEvents:'none', fontWeight:700}}>
            คลิกซ้ายบนแผนที่เพื่อปักหมุดและแสดงพื้นที่ 500 เมตร
          </div>

          {mapError && (
            <div style={{
              position: 'absolute',
              inset: '24px',
              zIndex: 9999,
              display: 'grid',
              placeItems: 'center',
              background: 'rgba(0,0,0,0.72)',
              border: '1px solid var(--red)',
              borderRadius: '16px',
              color: 'var(--fg)',
              padding: '24px',
              textAlign: 'center'
            }}>
              <div>
                <h3 style={{color: 'var(--red)', marginBottom: '8px'}}>GISTDA Map Error</h3>
                <p>{mapError}</p>
              </div>
            </div>
          )}

          <div className="map-ui">
            <div className="map-panel">
              <div style={{display: 'flex', alignItems: 'center', gap: '7px', background: 'var(--surface-hover)', padding: '7px 9px', borderRadius: '8px', maxWidth: '230px'}}>
                <Icons.Search />
                <input type="text" placeholder="Search location..." style={{background: 'transparent', border: 'none', color: 'var(--fg)', outline: 'none', width: '100%', fontSize: '12px'}} />
              </div>

              <div>
                <h4 style={{fontSize: '12px', color: '#e2e8f0', marginBottom: '12px', textTransform: 'uppercase'}}>GISTDA Sphere Layers</h4>
                <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
                  <label style={{display: 'flex', gap: '10px', cursor: 'pointer'}}>
                    <input type="checkbox" defaultChecked /> GISTDA / Sphere Base Map
                  </label>
                  <label style={{display: 'flex', gap: '10px', cursor: 'pointer'}}>
                    <input type="checkbox" defaultChecked /> 500m Analysis Distance
                  </label>
                  <label style={{display: 'flex', gap: '10px', cursor: 'pointer'}}>
                    <input type="checkbox" defaultChecked /> Farm Zone Frames A / B / C / D
                  </label>
                  <label style={{display: 'flex', gap: '10px', cursor: 'pointer'}}>
                    <input type="checkbox" defaultChecked /> NDVI / NDWI Mock Result
                  </label>
                </div>
              </div>

              <div style={{marginTop: 'auto'}}>
                <div className="map-info-box" style={{padding: '12px', borderRadius: '8px'}}>
                  <div style={{fontSize: '12px', color: '#e2e8f0', marginBottom: '8px'}}>Legend</div>
                  <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'6px'}}><span style={{width:16,height:10,border:'2px solid var(--accent)',background:'rgba(0,255,136,.12)'}}></span> แปลง A: ปกติ</div>
                  <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'6px'}}><span style={{width:16,height:10,border:'2px solid var(--yellow)',background:'rgba(255,214,10,.12)'}}></span> แปลง B: เฝ้าระวัง</div>
                  <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'6px'}}><span style={{width:16,height:10,border:'2px solid var(--orange)',background:'rgba(255,106,0,.14)'}}></span> แปลง C: ต้องรดน้ำเพิ่ม</div>
                  <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'10px'}}><span style={{width:16,height:10,border:'2px solid var(--red)',background:'rgba(255,48,64,.12)'}}></span> แปลง D: เสี่ยงสูง</div>
                  <div style={{display:'flex', gap:'8px', alignItems:'center'}}><span style={{width:16,height:16,borderRadius:'50%',border:'2px solid var(--blue)',background:'rgba(0,229,255,.18)'}}></span> ระยะวิเคราะห์ 500 เมตร</div>
                </div>
              </div>

            <div></div>

<script id="agrivision-floating-chatbot-script">
  (function () {
    const chatWindow = document.getElementById("agriChatWindow");
    const chatToggle = document.getElementById("agriChatToggle");
    const chatClose = document.getElementById("agriChatClose");
    const chatBody = document.getElementById("agriChatBody");
    const chatInput = document.getElementById("agriChatInput");
    const sendBtn = document.getElementById("agriSendBtn");
    const typing = document.getElementById("agriTyping");

    if (!chatWindow || !chatToggle || !chatClose || !chatBody || !chatInput || !sendBtn || !typing) return;

    function openChat() {
      chatWindow.classList.add("open");
      chatToggle.style.display = "none";
      setTimeout(function () {
        chatInput.focus();
      }, 120);
      scrollToBottom();
    }

    function closeChat() {
      chatWindow.classList.remove("open");
      chatToggle.style.display = "grid";
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = "agri-message-row" + (role === "user" ? " user" : "");

      const bubble = document.createElement("div");
      bubble.className = "agri-message-bubble " + role;
      bubble.textContent = text;

      row.appendChild(bubble);
      chatBody.insertBefore(row, typing);
      scrollToBottom();
    }

    function mockBotReply(userText) {
      const lower = userText.toLowerCase();

      if (lower.includes("น้ำ") || lower.includes("water")) {
        return "กำลังวิเคราะห์ข้อมูลพื้นที่เกษตรให้ครับ 🌱 เบื้องต้นให้ดูค่า NDWI และปริมาณน้ำที่ระบบคำนวณจากจุดที่เลือกบนแผนที่";
      }

      if (lower.includes("ndvi") || lower.includes("ndwi")) {
        return "ค่า NDVI ใช้ดูความสมบูรณ์ของพืช ส่วน NDWI ใช้ดูความชื้น/น้ำในพื้นที่ครับ หาก NDWI ลดลงต่อเนื่องควรเฝ้าระวัง";
      }

      if (lower.includes("เสี่ยง") || lower.includes("risk")) {
        return "พื้นที่เสี่ยงจะดูจาก NDWI ต่ำ, Stress Factor สูง และ Health Score ลดลงครับ แนะนำให้ตรวจสอบจุดที่ระบบปักหมุดบนแผนที่";
      }

      return "กำลังวิเคราะห์ข้อมูลพื้นที่เกษตรให้ครับ 🌱";
    }

    function sendMessage(textFromButton) {
      const text = (textFromButton || chatInput.value).trim();
      if (!text) return;

      addMessage("user", text);
      chatInput.value = "";

      typing.classList.add("show");
      scrollToBottom();

      setTimeout(function () {
        typing.classList.remove("show");
        addMessage("bot", mockBotReply(text));
      }, 850);
    }

    chatToggle.addEventListener("click", openChat);
    chatClose.addEventListener("click", closeChat);
    sendBtn.addEventListener("click", function () {
      sendMessage();
    });

    chatInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    document.querySelectorAll(".agri-quick-actions button").forEach(function (button) {
      button.addEventListener("click", function () {
        sendMessage(button.dataset.question);
      });
    });
  })();
</script>
